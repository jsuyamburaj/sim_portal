<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Offer - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary-red: #c62828; --dark-red: #8B0000; --white: #ffffff; --glass-bg: rgba(255, 255, 255, 0.25); }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-red) 100%); min-height: 100vh; }
        .navbar { background: var(--glass-bg); backdrop-filter: blur(12px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--white); }
        .admin-login-btn { background: var(--white); color: var(--primary-red); border: none; padding: 0.5rem 1.5rem; border-radius: 25px; cursor: pointer; }
        .container { max-width: 600px; margin: 2rem auto; background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: 1rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.3); }
        h1, h3 { color: var(--white); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--white); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.9); border: none; border-radius: 8px; }
        .btn-submit { background: var(--primary-red); color: white; padding: 0.75rem; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-back { background: #666; color: white; padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
        @media (max-width: 768px) { .container { margin: 1rem; } }
    </style>
</head>
<body>
    <div style="max-width: 1200px; margin: 0 auto;"><div class="navbar"><div class="logo">📱 Admin Portal</div><button id="logoutBtn" class="admin-login-btn">Logout</button></div></div>
    <div class="container">
        <a href="/admin/manage-offers.html" class="btn-back">← Back to Offers</a>
        <h1>Add New Offer</h1>
        <form id="offerForm">
            <div class="form-group"><label>Offer Name</label><input type="text" id="offerName" required placeholder="e.g., Summer Special"></div>
            <div class="form-group"><label>Description</label><textarea id="offerDesc" rows="3" placeholder="Brief description"></textarea></div>
            <div class="form-group"><label>Price (₹)</label><input type="number" id="offerPrice" required step="0.01"></div>
            <div class="form-group"><label>Data Allowance</label><input type="text" id="offerData" placeholder="e.g., 2GB/day"></div>
            <div class="form-group"><label>Validity (Days)</label><input type="number" id="offerValidity" required></div>
            <button type="submit" class="btn-submit">Create Offer</button>
        </form>
    </div>
    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = '/';
        document.getElementById('logoutBtn').onclick = () => { if(confirm('Logout?')){ sessionStorage.removeItem('adminLoggedIn'); window.location.href='/'; } };
        document.getElementById('offerForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { name: document.getElementById('offerName').value, description: document.getElementById('offerDesc').value, price: parseFloat(document.getElementById('offerPrice').value), dataAmount: document.getElementById('offerData').value, validityDays: parseInt(document.getElementById('offerValidity').value), active: true };
            const res = await fetch(`${API_BASE_URL}/offers`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) { alert('Offer created!'); window.location.href = '/admin/manage-offers.html'; }
            else alert('Error creating offer');
        };
    </script>
</body>
</html>
