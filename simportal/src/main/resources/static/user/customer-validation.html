<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Validation - SIM Activation</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Telecom SIM Activation</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/user/status.html">Status</a>
            </div>
        </div>
    </nav>

    <div id="progressContainer"></div>

    <div class="form-container">
        <h2>Step 2: Customer Details</h2>
        <form id="customerForm">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" required pattern="[0-9]{10}">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob" required>
            </div>
            <button type="submit" class="btn-next">Continue →</button>
        </form>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/user/progress.js"></script>
    <script src="/js/user/customer.js"></script>
</body>
</html>
