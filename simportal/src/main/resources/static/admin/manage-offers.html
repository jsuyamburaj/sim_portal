<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Offers | Glass Theme</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary: #1a237e;
        --action: #ffb300;
        --support: #0288d1;
        --glass-card: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.25);
        --glass-blur: blur(12px);
        --white: #fff;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--primary) 0%, #0d1757 100%);
        min-height: 100vh;
      }
      .navbar {
        background: rgba(26, 35, 126, 0.3);
        backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
        color: var(--white);
      }
      .admin-login-btn {
        background: var(--action);
        color: var(--primary);
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
      }
      .admin-container {
        display: flex;
        gap: 1rem;
        max-width: 1400px;
        margin: 1rem auto;
        padding: 0 1rem;
      }
      .admin-sidebar {
        width: 250px;
        background: rgba(26, 35, 126, 0.3);
        backdrop-filter: var(--glass-blur);
        border-radius: 1rem;
        padding: 1.5rem 0;
      }
      .admin-sidebar a {
        display: block;
        padding: 0.8rem 1.5rem;
        color: var(--white);
        text-decoration: none;
      }
      .admin-sidebar a:hover,
      .admin-sidebar a.active {
        background: var(--action);
        color: var(--primary);
      }
      .admin-content {
        flex: 1;
        background: var(--glass-card);
        backdrop-filter: var(--glass-blur);
        border-radius: 1rem;
        padding: 1.5rem;
      }
      .admin-content h1 {
        color: var(--white);
        margin-bottom: 1rem;
      }
      .btn-add {
        background: #4caf50;
        color: white;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 1rem;
      }
      .data-table {
        width: 100%;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 12px;
        overflow-x: auto;
      }
      .data-table th {
        background: var(--primary);
        color: white;
        padding: 1rem;
        text-align: left;
      }
      .data-table td {
        padding: 1rem;
        border-bottom: 1px solid #ddd;
      }
      .btn-edit {
        background: #2196f3;
        color: white;
        padding: 0.3rem 0.8rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .btn-delete {
        background: #f44336;
        color: white;
        padding: 0.3rem 0.8rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-left: 0.5rem;
      }
      @media (max-width: 768px) {
        .nav-container {
          flex-direction: column;
          gap: 1rem;
        }
        .admin-container {
          flex-direction: column;
        }
        .admin-sidebar {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">📱 Admin Portal</div>
        <div class="nav-links">
          <span>Admin</span
          ><button id="logoutBtn" class="admin-login-btn">Logout</button>
        </div>
      </div>
    </nav>
    <div class="admin-container">
      <div class="admin-sidebar">
        <a href="/admin/admin-dashboard.html">📊 Dashboard</a
        ><a href="/admin/manage-users.html">👥 Manage Users</a
        ><a href="/admin/manage-offers.html" class="active">🎁 Manage Offers</a>
      </div>
      <div class="admin-content">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h1>Manage Offers</h1>
          <button
            class="btn-add"
            onclick="location.href = '/admin/add-offer.html'"
          >
            + Add New Offer
          </button>
        </div>
        <div style="overflow-x: auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Data</th>
                <th>Validity</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="offersTableBody">
              <tr>
                <td colspan="6">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script>
      const API_BASE_URL = "http://localhost:8080/api";
      if (!sessionStorage.getItem("adminLoggedIn")) window.location.href = "/";
      document.getElementById("logoutBtn").onclick = () => {
        if (confirm("Logout?")) {
          sessionStorage.removeItem("adminLoggedIn");
          window.location.href = "/";
        }
      };
      async function loadOffers() {
        try {
          let res = await fetch(`${API_BASE_URL}/offers`);
          let offers = await res.json();
          let tbody = document.getElementById("offersTableBody");
          if (offers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">No offers</td></tr>';
            return;
          }
          tbody.innerHTML = offers
            .map(
              (o) =>
                `<tr><td>${o.id}</td><td>${o.name}</td><td>₹${o.price}</td><td>${o.dataAmount || "-"}</td><td>${o.validityDays} days</td><td><button class="btn-edit" onclick="editOffer(${o.id})">Edit</button><button class="btn-delete" onclick="deleteOffer(${o.id})">Delete</button></td></tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }
      function editOffer(id) {
        window.location.href = `/admin/edit-offer.html?id=${id}`;
      }
      async function deleteOffer(id) {
        if (confirm("Delete offer?")) {
          await fetch(`${API_BASE_URL}/offers/${id}`, { method: "DELETE" });
          loadOffers();
        }
      }
      loadOffers();
    </script>
  </body>
</html>
