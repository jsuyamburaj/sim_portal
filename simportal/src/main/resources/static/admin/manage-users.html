<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Admin Portal</div>
            <div class="nav-links">
                <span>Welcome, Admin</span>
                <button id="logoutBtn" class="admin-login-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <a href="/admin/admin-dashboard.html">📊 Dashboard</a>
            <a href="/admin/manage-users.html" class="active">👥 Manage Users</a>
            <a href="/admin/manage-offers.html">🎁 Manage Offers</a>
        </div>
        <div class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h1>Manage Users</h1>
                <button class="btn-add" onclick="showAddUserModal()">+ Add New User</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>SIM Number</th>
                            <th>Selected Offer</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="8">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content" style="max-width: 600px; max-height: 80vh; overflow-y: auto;">
            <div class="modal-header">
                <h2 id="modalTitle">Add User</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="userForm">
                <h3 style="color: var(--primary-red); margin-top: 0;">Personal Information</h3>
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="phone" required pattern="[0-9]{10}">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob">
                </div>

                <h3 style="color: var(--primary-red);">SIM & Offer Details</h3>
                <div class="form-group">
                    <label>SIM Number</label>
                    <input type="text" id="simNumber" placeholder="Enter SIM number">
                </div>
                <div class="form-group">
                    <label>Select Offer</label>
                    <select id="offerId">
                        <option value="">No offer</option>
                    </select>
                </div>

                <h3 style="color: var(--primary-red);">Address Details</h3>
                <div class="form-group">
                    <label>Street</label>
                    <input type="text" id="street">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" id="state">
                </div>
                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" id="pincode" pattern="[0-9]{6}">
                </div>
                <div class="form-group">
                    <label>Landmark</label>
                    <input type="text" id="landmark">
                </div>

                <h3 style="color: var(--primary-red);">ID Proof Details</h3>
                <div class="form-group">
                    <label>ID Type</label>
                    <select id="idType">
                        <option value="AADHAR">Aadhar Card</option>
                        <option value="PAN">PAN Card</option>
                        <option value="PASSPORT">Passport</option>
                        <option value="VOTER_ID">Voter ID</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ID Number</label>
                    <input type="text" id="idNumber">
                </div>

                <button type="submit" class="btn-login">Save User</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin/logout.js"></script>
    <script src="/js/admin/users.js"></script>
</body>
</html>
