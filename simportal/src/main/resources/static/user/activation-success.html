<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activation Success | Glass Theme</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary: #1a237e;
        --action: #ffb300;
        --support: #0288d1;
        --glass-card: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.25);
        --glass-blur: blur(12px);
        --white: #fff;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--primary) 0%, #0d1757 100%);
        min-height: 100vh;
      }
      .navbar {
        background: rgba(26, 35, 126, 0.3);
        backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
      }
      .nav-links {
        display: flex;
        gap: 2rem;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--white);
        font-weight: 500;
      }
      .nav-links a:hover {
        color: var(--action);
      }
      .progress-container {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .progress-steps {
        display: flex;
        justify-content: space-between;
        position: relative;
        margin-bottom: 2rem;
      }
      .progress-steps::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        z-index: 1;
      }
      .step {
        position: relative;
        z-index: 2;
        background: var(--glass-card);
        backdrop-filter: blur(4px);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        border: 2px solid var(--glass-border);
        color: var(--white);
      }
      .step.completed {
        border-color: var(--action);
        background: var(--action);
        color: var(--primary);
      }
      .step-label {
        position: absolute;
        top: 45px;
        font-size: 0.75rem;
        white-space: nowrap;
        color: var(--white);
      }
      .success-container {
        max-width: 600px;
        margin: 2rem auto;
        background: var(--glass-card);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: 1.5rem;
        padding: 2rem;
        text-align: center;
      }
      .success-icon {
        font-size: 5rem;
        margin-bottom: 1rem;
      }
      .success-container h2 {
        color: #4caf50;
        margin-bottom: 1rem;
      }
      .status-details {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        padding: 1rem;
        margin: 1.5rem 0;
        text-align: left;
      }
      .status-details p {
        margin: 0.5rem 0;
        color: var(--white);
      }
      .btn-home {
        background: var(--action);
        color: var(--primary);
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: 0.3s;
      }
      .btn-home:hover {
        background: #ff8f00;
        transform: translateY(-2px);
      }
      @media (max-width: 768px) {
        .nav-container {
          flex-direction: column;
          gap: 1rem;
        }
        .step-label {
          display: none;
        }
        .success-container {
          margin: 1rem;
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">📱 SIM Activation Portal</div>
        <div class="nav-links">
          <a href="/">Home</a><a href="/user/status.html">Check Status</a>
        </div>
      </div>
    </nav>
    <div class="progress-container">
      <div class="progress-steps">
        <div class="step completed">
          1<span class="step-label">SIM Validation</span>
        </div>
        <div class="step completed">
          2<span class="step-label">Customer Details</span>
        </div>
        <div class="step completed">
          3<span class="step-label">Address</span>
        </div>
        <div class="step completed">
          4<span class="step-label">ID Proof</span>
        </div>
        <div class="step completed">
          5<span class="step-label">Offers</span>
        </div>
        <div class="step completed">
          6<span class="step-label">Activation</span>
        </div>
      </div>
    </div>
    <div class="success-container">
      <div class="success-icon">🎉</div>
      <h2>Congratulations!</h2>
      <p>Your SIM has been successfully activated!</p>
      <div class="status-details">
        <p><strong>📱 SIM Number:</strong> <span id="simNumber"></span></p>
        <p><strong>📞 Mobile Number:</strong> Will be assigned within 24h</p>
        <p>
          <strong>📅 Activation Date:</strong> <span id="activationDate"></span>
        </p>
        <p>
          <strong>✅ Status:</strong>
          <span style="color: #4caf50">ACTIVATED</span>
        </p>
      </div>
      <a href="/" class="btn-home">Go to Home</a>
    </div>
    <script>
      let sim = sessionStorage.getItem("simData");
      if (sim) {
        let s = JSON.parse(sim);
        document.getElementById("simNumber").innerText = s.simNumber || "";
      }
      document.getElementById("activationDate").innerText =
        new Date().toLocaleDateString();
    </script>
  </body>
</html>
