<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIM Validation | Glass Theme</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary: #1a237e;
        --action: #ffb300;
        --support: #0288d1;
        --glass-bg: rgba(26, 35, 126, 0.3);
        --glass-card: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.25);
        --glass-blur: blur(12px);
        --white: #ffffff;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--primary) 0%, #0d1757 100%);
        min-height: 100vh;
      }
      .navbar {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
      }
      .nav-links {
        display: flex;
        gap: 2rem;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--white);
        font-weight: 500;
      }
      .nav-links a:hover {
        color: var(--action);
      }
      .progress-container {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .progress-steps {
        display: flex;
        justify-content: space-between;
        position: relative;
        margin-bottom: 2rem;
      }
      .progress-steps::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        z-index: 1;
      }
      .step {
        position: relative;
        z-index: 2;
        background: var(--glass-card);
        backdrop-filter: blur(4px);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        border: 2px solid var(--glass-border);
        color: var(--white);
      }
      .step.active {
        border-color: var(--support);
        background: var(--support);
        color: white;
      }
      .step-label {
        position: absolute;
        top: 45px;
        font-size: 0.75rem;
        white-space: nowrap;
        color: var(--white);
      }
      .form-container {
        max-width: 600px;
        margin: 2rem auto;
        background: var(--glass-card);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: 1.5rem;
        padding: 2rem;
      }
      .form-container h2 {
        color: var(--white);
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        color: var(--white);
        margin-bottom: 0.5rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
      }
      .btn-next {
        background: var(--action);
        color: var(--primary);
        padding: 0.75rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        width: 100%;
        margin-top: 1rem;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-next:hover {
        background: #ff8f00;
        transform: translateY(-2px);
      }
      @media (max-width: 768px) {
        .nav-container {
          flex-direction: column;
          gap: 1rem;
        }
        .step-label {
          display: none;
        }
        .form-container {
          margin: 1rem;
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">📱 SIM Activation Portal</div>
        <div class="nav-links">
          <a href="/">Home</a>
          <a href="/user/status.html">Check Status</a>
        </div>
      </div>
    </nav>

    <div class="progress-container">
      <div class="progress-steps">
        <div class="step active">
          1<span class="step-label">SIM Validation</span>
        </div>
        <div class="step">
          2<span class="step-label">Customer Details</span>
        </div>
        <div class="step">3<span class="step-label">Address</span></div>
        <div class="step">4<span class="step-label">ID Proof</span></div>
        <div class="step">5<span class="step-label">Offers</span></div>
        <div class="step">6<span class="step-label">Activation</span></div>
      </div>
    </div>

    <div class="form-container">
      <h2>Step 1: SIM Validation</h2>
      <form id="simForm">
        <div class="form-group">
          <label>SIM Number (20 digits)</label>
          <input
            type="text"
            id="simNumber"
            required
            maxlength="20"
            placeholder="Enter SIM number"
          />
        </div>
        <div class="form-group">
          <label>ICCID (Optional)</label>
          <input type="text" id="iccid" placeholder="Enter ICCID" />
        </div>
        <button type="submit" class="btn-next">Validate & Continue →</button>
      </form>
    </div>

    <script>
      const API_BASE_URL = "http://localhost:8080/api";
      function saveToSession(key, value) {
        sessionStorage.setItem(key, JSON.stringify(value));
      }
      document
        .getElementById("simForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const simNumber = document.getElementById("simNumber").value;
          const iccid = document.getElementById("iccid").value;
          try {
            const res = await fetch(`${API_BASE_URL}/customer/validate`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ simNumber }),
            });
            const data = await res.json();
            if (data.valid) {
              saveToSession("simData", { simNumber, iccid, validated: true });
              window.location.href = "/user/customer-validation.html";
            } else {
              alert(data.message || "Invalid SIM number");
            }
          } catch (error) {
            alert("Error validating SIM");
          }
        });
    </script>
  </body>
</html>
