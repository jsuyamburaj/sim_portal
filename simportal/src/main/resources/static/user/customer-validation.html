<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Validation | Glass Theme</title>
    <style>
      /* Same glass base as previous page – copy the same style block from sim-validation.html */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary: #1a237e;
        --action: #ffb300;
        --support: #0288d1;
        --glass-card: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.25);
        --glass-blur: blur(12px);
        --white: #ffffff;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--primary) 0%, #0d1757 100%);
        min-height: 100vh;
      }
      .navbar {
        background: rgba(26, 35, 126, 0.3);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
      }
      .nav-links {
        display: flex;
        gap: 2rem;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--white);
        font-weight: 500;
      }
      .nav-links a:hover {
        color: var(--action);
      }
      .progress-container {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .progress-steps {
        display: flex;
        justify-content: space-between;
        position: relative;
        margin-bottom: 2rem;
      }
      .progress-steps::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        z-index: 1;
      }
      .step {
        position: relative;
        z-index: 2;
        background: var(--glass-card);
        backdrop-filter: blur(4px);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        border: 2px solid var(--glass-border);
        color: var(--white);
      }
      .step.completed {
        border-color: var(--action);
        background: var(--action);
        color: var(--primary);
      }
      .step.active {
        border-color: var(--support);
        background: var(--support);
        color: white;
      }
      .step-label {
        position: absolute;
        top: 45px;
        font-size: 0.75rem;
        white-space: nowrap;
        color: var(--white);
      }
      .form-container {
        max-width: 600px;
        margin: 2rem auto;
        background: var(--glass-card);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: 1.5rem;
        padding: 2rem;
      }
      .form-container h2 {
        color: var(--white);
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        color: var(--white);
        margin-bottom: 0.5rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
      }
      .btn-next {
        background: var(--action);
        color: var(--primary);
        padding: 0.75rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        width: 100%;
        margin-top: 1rem;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-next:hover {
        background: #ff8f00;
        transform: translateY(-2px);
      }
      @media (max-width: 768px) {
        .nav-container {
          flex-direction: column;
          gap: 1rem;
        }
        .step-label {
          display: none;
        }
        .form-container {
          margin: 1rem;
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">📱 SIM Activation Portal</div>
        <div class="nav-links">
          <a href="/">Home</a><a href="/user/status.html">Check Status</a>
        </div>
      </div>
    </nav>
    <div class="progress-container">
      <div class="progress-steps">
        <div class="step completed">
          1<span class="step-label">SIM Validation</span>
        </div>
        <div class="step active">
          2<span class="step-label">Customer Details</span>
        </div>
        <div class="step">3<span class="step-label">Address</span></div>
        <div class="step">4<span class="step-label">ID Proof</span></div>
        <div class="step">5<span class="step-label">Offers</span></div>
        <div class="step">6<span class="step-label">Activation</span></div>
      </div>
    </div>
    <div class="form-container">
      <h2>Step 2: Customer Validation</h2>
      <form id="customerForm">
        <div class="form-group">
          <label>First Name *</label
          ><input type="text" id="firstName" required />
        </div>
        <div class="form-group">
          <label>Last Name *</label><input type="text" id="lastName" required />
        </div>
        <div class="form-group">
          <label>Email *</label><input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label>Date of Birth *</label><input type="date" id="dob" required />
        </div>
        <div class="form-group">
          <label>Phone Number *</label
          ><input type="tel" id="phone" required pattern="[0-9]{10}" />
        </div>
        <button type="submit" class="btn-next">Continue →</button>
      </form>
    </div>
    <script>
      const API_BASE_URL = "http://localhost:8080/api";
      function getSession(key) {
        const val = sessionStorage.getItem(key);
        return val ? JSON.parse(val) : null;
      }
      function setSession(key, val) {
        sessionStorage.setItem(key, JSON.stringify(val));
      }
      const saved = getSession("customerData");
      if (saved) {
        document.getElementById("firstName").value = saved.firstName || "";
        document.getElementById("lastName").value = saved.lastName || "";
        document.getElementById("email").value = saved.email || "";
        document.getElementById("dob").value = saved.dob || "";
        document.getElementById("phone").value = saved.phone || "";
      }
      document
        .getElementById("customerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const data = {
            firstName: document.getElementById("firstName").value,
            lastName: document.getElementById("lastName").value,
            email: document.getElementById("email").value,
            dob: document.getElementById("dob").value,
            phone: document.getElementById("phone").value,
          };
          try {
            const res = await fetch(`${API_BASE_URL}/customer/validate`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });
            const result = await res.json();
            if (result.valid) {
              setSession("customerData", data);
              window.location.href = "/user/address.html";
            } else alert("Please fill all fields correctly.");
          } catch (err) {
            alert("Error validating customer");
          }
        });
    </script>
  </body>
</html>
