<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Offers - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #c62828;
            --dark-red: #8B0000;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-red) 100%);
            min-height: 100vh;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            color: var(--white);
        }

        .admin-login-btn {
            background: var(--white);
            color: var(--primary-red);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-container {
            display: flex;
            min-height: calc(100vh - 70px);
            max-width: 1400px;
            margin: 1rem auto;
            gap: 1rem;
            padding: 0 1rem;
        }

        .admin-sidebar {
            width: 250px;
            background: rgba(139, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem 0;
        }

        .admin-sidebar a {
            display: block;
            padding: 0.8rem 1.5rem;
            color: var(--white);
            text-decoration: none;
            transition: background 0.3s;
        }

        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: var(--primary-red);
        }

        .admin-content {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .admin-content h1 {
            color: var(--white);
            margin-bottom: 1.5rem;
        }

        .btn-add {
            background: #4caf50;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .data-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            overflow-x: auto;
            border-collapse: collapse;
        }

        .data-table th {
            background: var(--primary-red);
            color: var(--white);
            padding: 1rem;
            text-align: left;
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        .btn-edit {
            background: #2196f3;
            color: white;
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        @media (max-width: 768px) {
            .admin-container { flex-direction: column; }
            .admin-sidebar { width: 100%; }
            .data-table { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Admin Portal</div>
            <div class="nav-links">
                <span>Admin</span>
                <button id="logoutBtn" class="admin-login-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <a href="/admin/admin-dashboard.html">📊 Dashboard</a>
            <a href="/admin/manage-users.html">👥 Manage Users</a>
            <a href="/admin/manage-offers.html" class="active">🎁 Manage Offers</a>
        </div>
        <div class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h1>Manage Offers</h1>
                <button class="btn-add" onclick="window.location.href='/admin/add-offer.html'">+ Add New Offer</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Data</th><th>Validity</th><th>Actions</th></tr></thead>
                    <tbody id="offersTableBody"><tr><td colspan="6">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        
        if (!sessionStorage.getItem('adminLoggedIn')) window.location.href = '/';
        
        document.getElementById('logoutBtn').onclick = () => {
            if (confirm('Logout?')) { sessionStorage.removeItem('adminLoggedIn'); window.location.href = '/'; }
        };
        
        async function loadOffers() {
            const res = await fetch(`${API_BASE_URL}/offers`);
            const offers = await res.json();
            const tbody = document.getElementById('offersTableBody');
            if (!offers.length) { tbody.innerHTML = '<tr><td colspan="6">No offers</td></tr>'; return; }
            tbody.innerHTML = offers.map(o => `
                <tr><td>${o.id}</td><td>${o.name}</td><td>₹${o.price}</td><td>${o.dataAmount || '-'}</td><td>${o.validityDays} days</td>
                <td><button class="btn-edit" onclick="editOffer(${o.id})">Edit</button><button class="btn-delete" onclick="deleteOffer(${o.id})">Delete</button></td></tr>
            `).join('');
        }
        
        function editOffer(id) { window.location.href = `/admin/edit-offer.html?id=${id}`; }
        async function deleteOffer(id) { if(confirm('Delete?')){ await fetch(`${API_BASE_URL}/offers/${id}`,{method:'DELETE'}); loadOffers(); } }
        loadOffers();
    </script>
</body>
</html>
