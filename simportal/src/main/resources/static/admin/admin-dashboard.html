<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SIM Activation</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Admin Portal</div>
            <div class="nav-links">
                <span id="adminName">Admin</span>
                <button id="logoutBtn" class="admin-login-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <a href="/admin/admin-dashboard.html">📊 Dashboard</a>
            <a href="/admin/manage-users.html">👥 Manage Users</a>
            <a href="/admin/manage-offers.html">🎁 Manage Offers</a>
        </div>
        <div class="admin-content">
            <h1>Dashboard</h1>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-number" id="totalCustomers">0</div>
                    <div>Total Customers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalOffers">0</div>
                    <div>Active Offers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeActivations">0</div>
                    <div>Active Activations</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin/logout.js"></script>
    <script src="/js/admin/dashboard.js"></script>
</body>
</html>
