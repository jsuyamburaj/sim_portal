<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Glass Theme</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary: #1a237e;
        --action: #ffb300;
        --support: #0288d1;
        --glass-card: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.25);
        --glass-blur: blur(12px);
        --white: #fff;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--primary) 0%, #0d1757 100%);
        min-height: 100vh;
      }
      .navbar {
        background: rgba(26, 35, 126, 0.3);
        backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
        color: var(--white);
      }
      .admin-login-btn {
        background: var(--action);
        color: var(--primary);
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
      }
      .admin-container {
        display: flex;
        gap: 1rem;
        max-width: 1400px;
        margin: 1rem auto;
        padding: 0 1rem;
      }
      .admin-sidebar {
        width: 250px;
        background: rgba(26, 35, 126, 0.3);
        backdrop-filter: var(--glass-blur);
        border-radius: 1rem;
        padding: 1.5rem 0;
      }
      .admin-sidebar a {
        display: block;
        padding: 0.8rem 1.5rem;
        color: var(--white);
        text-decoration: none;
      }
      .admin-sidebar a:hover,
      .admin-sidebar a.active {
        background: var(--action);
        color: var(--primary);
      }
      .admin-content {
        flex: 1;
        background: var(--glass-card);
        backdrop-filter: var(--glass-blur);
        border-radius: 1rem;
        padding: 1.5rem;
      }
      .admin-content h1 {
        color: var(--white);
        margin-bottom: 1.5rem;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        padding: 1rem;
        text-align: center;
        color: var(--white);
      }
      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: var(--action);
      }
      @media (max-width: 768px) {
        .nav-container {
          flex-direction: column;
          gap: 1rem;
        }
        .admin-container {
          flex-direction: column;
        }
        .admin-sidebar {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">📱 Admin Portal</div>
        <div class="nav-links">
          <span>Admin</span
          ><button id="logoutBtn" class="admin-login-btn">Logout</button>
        </div>
      </div>
    </nav>
    <div class="admin-container">
      <div class="admin-sidebar">
        <a href="/admin/admin-dashboard.html" class="active">📊 Dashboard</a
        ><a href="/admin/manage-users.html">👥 Manage Users</a
        ><a href="/admin/manage-offers.html">🎁 Manage Offers</a>
      </div>
      <div class="admin-content">
        <h1>Dashboard</h1>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="totalCustomers">0</div>
            <p>Total Customers</p>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalOffers">0</div>
            <p>Active Offers</p>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="activeActivations">0</div>
            <p>Active Activations</p>
          </div>
        </div>
      </div>
    </div>
    <script>
      const API_BASE_URL = "http://localhost:8080/api";
      if (!sessionStorage.getItem("adminLoggedIn")) window.location.href = "/";
      document.getElementById("logoutBtn").onclick = () => {
        if (confirm("Logout?")) {
          sessionStorage.removeItem("adminLoggedIn");
          window.location.href = "/";
        }
      };
      async function loadStats() {
        try {
          let users = await fetch(`${API_BASE_URL}/admin/users`);
          let usersData = await users.json();
          document.getElementById("totalCustomers").innerText =
            usersData.length || 0;
          let offers = await fetch(`${API_BASE_URL}/offers`);
          let offersData = await offers.json();
          document.getElementById("totalOffers").innerText =
            offersData.length || 0;
        } catch (e) {
          console.error(e);
        }
      }
      loadStats();
    </script>
  </body>
</html>
