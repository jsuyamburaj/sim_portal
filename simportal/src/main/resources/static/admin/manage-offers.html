<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Offers - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Admin Portal</div>
            <div class="nav-links">
                <span>Welcome, Admin</span>
                <button id="logoutBtn" class="admin-login-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <a href="/admin/admin-dashboard.html">📊 Dashboard</a>
            <a href="/admin/manage-users.html">👥 Manage Users</a>
            <a href="/admin/manage-offers.html" class="active">🎁 Manage Offers</a>
        </div>
        <div class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h1>Manage Offers</h1>
                <button class="btn-add" onclick="showAddOfferModal()">+ Add New Offer</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Data</th>
                            <th>Validity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="offersTableBody">
                         <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Offer Modal -->
    <div id="offerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="offerModalTitle">Add Offer</h2>
                <span class="close" onclick="closeOfferModal()">&times;</span>
            </div>
            <form id="offerForm">
                <div class="form-group">
                    <label>Offer Name *</label>
                    <input type="text" id="offerName" required placeholder="e.g., Summer Special">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="offerDesc" placeholder="Brief description">
                </div>
                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" id="offerPrice" required placeholder="199">
                </div>
                <div class="form-group">
                    <label>Data Allowance</label>
                    <input type="text" id="offerData" placeholder="e.g., 2GB/day, Unlimited">
                </div>
                <div class="form-group">
                    <label>Validity (Days) *</label>
                    <input type="number" id="offerValidity" required placeholder="28">
                </div>
                <button type="submit" class="btn-login">Save Offer</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin/logout.js"></script>
    <script src="/js/admin/offers.js"></script>
</body>
</html>
