<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #c62828;
            --dark-red: #8B0000;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-red) 100%);
            min-height: 100vh;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            color: var(--white);
        }

        .admin-login-btn {
            background: var(--white);
            color: var(--primary-red);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-container {
            display: flex;
            min-height: calc(100vh - 70px);
            max-width: 1400px;
            margin: 1rem auto;
            gap: 1rem;
            padding: 0 1rem;
        }

        .admin-sidebar {
            width: 250px;
            background: rgba(139, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem 0;
        }

        .admin-sidebar a {
            display: block;
            padding: 0.8rem 1.5rem;
            color: var(--white);
            text-decoration: none;
            transition: background 0.3s;
        }

        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: var(--primary-red);
        }

        .admin-content {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .admin-content h1 {
            color: var(--white);
            margin-bottom: 1.5rem;
        }

        .btn-add {
            background: #4caf50;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .data-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            overflow-x: auto;
            border-collapse: collapse;
        }

        .data-table th {
            background: var(--primary-red);
            color: var(--white);
            padding: 1rem;
            text-align: left;
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        .btn-edit {
            background: #2196f3;
            color: white;
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.pending { background: #ff9800; color: white; }
        .status-badge.verified { background: #2196f3; color: white; }
        .status-badge.activated { background: #4caf50; color: white; }

        @media (max-width: 768px) {
            .admin-container { flex-direction: column; }
            .admin-sidebar { width: 100%; }
            .nav-container { flex-direction: column; gap: 1rem; }
            .data-table { font-size: 0.8rem; }
            .data-table th, .data-table td { padding: 0.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Admin Portal</div>
            <div class="nav-links">
                <span>Admin</span>
                <button id="logoutBtn" class="admin-login-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <a href="/admin/admin-dashboard.html">📊 Dashboard</a>
            <a href="/admin/manage-users.html" class="active">👥 Manage Users</a>
            <a href="/admin/manage-offers.html">🎁 Manage Offers</a>
        </div>
        <div class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h1>Manage Users</h1>
                <button class="btn-add" onclick="window.location.href='/admin/add-user.html'">+ Add New User</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>SIM</th><th>Offer</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="8">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = '/';
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Logout?')) {
                sessionStorage.removeItem('adminLoggedIn');
                window.location.href = '/';
            }
        });
        
        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/users`);
                const users = await res.json();
                const tbody = document.getElementById('usersTableBody');
                
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8">No users found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.firstName || ''} ${user.lastName || ''}</td>
                        <td>${user.email || '-'}</td>
                        <td>${user.phone || '-'}</td>
                        <td>${user.sim?.simNumber || '-'}</td>
                        <td>${user.selectedOffer?.name || '-'}</td>
                        <td><span class="status-badge ${(user.activationStatus || 'pending').toLowerCase()}">${user.activationStatus || 'PENDING'}</span></td>
                        <td>
                            <button class="btn-edit" onclick="editUser(${user.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteUser(${user.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="8">Error loading users</td></tr>';
            }
        }
        
        function editUser(id) {
            window.location.href = `/admin/edit-user.html?id=${id}`;
        }
        
        async function deleteUser(id) {
            if (confirm('Delete this user?')) {
                await fetch(`${API_BASE_URL}/admin/users/${id}`, { method: 'DELETE' });
                loadUsers();
            }
        }
        
        loadUsers();
    </script>
</body>
</html>
