<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SIM Activation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #c62828;
            --dark-red: #8B0000;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-red) 100%);
            min-height: 100vh;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            color: var(--white);
        }

        .admin-login-btn {
            background: var(--white);
            color: var(--primary-red);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-container {
            display: flex;
            min-height: calc(100vh - 70px);
            max-width: 1400px;
            margin: 1rem auto;
            gap: 1rem;
            padding: 0 1rem;
        }

        .admin-sidebar {
            width: 250px;
            background: rgba(139, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem 0;
        }

        .admin-sidebar a {
            display: block;
            padding: 0.8rem 1.5rem;
            color: var(--white);
            text-decoration: none;
            transition: background 0.3s;
        }

        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: var(--primary-red);
        }

        .admin-content {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .admin-content h1 {
            color: var(--white);
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffeb3b;
        }

        .stat-card p {
            color: var(--white);
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
            }
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Admin Portal</div>
            <div class="nav-links">
                <span>Welcome, Admin</span>
                <button id="logoutBtn" class="admin-login-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <a href="/admin/admin-dashboard.html" class="active">📊 Dashboard</a>
            <a href="/admin/manage-users.html">👥 Manage Users</a>
            <a href="/admin/manage-offers.html">🎁 Manage Offers</a>
        </div>
        <div class="admin-content">
            <h1>Dashboard</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalCustomers">0</div>
                    <p>Total Customers</p>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalOffers">0</div>
                    <p>Active Offers</p>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeActivations">0</div>
                    <p>Active Activations</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = '/';
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('adminLoggedIn');
                window.location.href = '/';
            }
        });
        
        async function loadStats() {
            try {
                const usersRes = await fetch(`${API_BASE_URL}/admin/users`);
                if (usersRes.ok) {
                    const users = await usersRes.json();
                    document.getElementById('totalCustomers').textContent = users.length || 0;
                }
                
                const offersRes = await fetch(`${API_BASE_URL}/offers`);
                if (offersRes.ok) {
                    const offers = await offersRes.json();
                    document.getElementById('totalOffers').textContent = offers.length || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        loadStats();
    </script>
</body>
</html>
