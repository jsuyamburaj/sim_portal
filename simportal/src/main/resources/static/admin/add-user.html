<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New User - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Admin Portal</div>
            <div class="nav-links">
                <span>Welcome, Admin</span>
                <button id="logoutBtn" class="admin-login-btn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <a href="/admin/admin-dashboard.html">📊 Dashboard</a>
            <a href="/admin/manage-users.html">👥 Manage Users</a>
            <a href="/admin/manage-offers.html">🎁 Manage Offers</a>
        </div>
        <div class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h1>Add New User</h1>
                <a href="/admin/manage-users.html" class="btn-add" style="text-decoration: none;">← Back to Users</a>
            </div>

            <div class="form-container" style="max-width: 700px; margin: 0;">
                <form id="addUserForm">
                    <h3 style="color: var(--primary-red); margin-top: 0;">Personal Information</h3>
                    
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>

                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone *</label>
                            <input type="tel" id="phone" required pattern="[0-9]{10}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob">
                    </div>

                    <h3 style="color: var(--primary-red);">SIM & Offer Details</h3>
                    
                    <div class="form-group">
                        <label>SIM Number</label>
                        <input type="text" id="simNumber" placeholder="Enter SIM number (e.g., SIM123456789012345678)">
                        <small style="color: #666;">Leave empty if not assigning a SIM</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Select Offer</label>
                        <select id="offerId">
                            <option value="">No offer</option>
                        </select>
                    </div>

                    <h3 style="color: var(--primary-red);">Address Details</h3>
                    
                    <div class="form-group">
                        <label>Street Address</label>
                        <input type="text" id="street">
                    </div>
                    
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="city">
                        </div>
                        <div class="form-group">
                            <label>State</label>
                            <input type="text" id="state">
                        </div>
                    </div>
                    
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Pincode</label>
                            <input type="text" id="pincode" pattern="[0-9]{6}">
                        </div>
                        <div class="form-group">
                            <label>Landmark</label>
                            <input type="text" id="landmark">
                        </div>
                    </div>

                    <h3 style="color: var(--primary-red);">ID Proof Details</h3>
                    
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>ID Type</label>
                            <select id="idType">
                                <option value="AADHAR">Aadhar Card</option>
                                <option value="PAN">PAN Card</option>
                                <option value="PASSPORT">Passport</option>
                                <option value="VOTER_ID">Voter ID</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>ID Number</label>
                            <input type="text" id="idNumber">
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Create User</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin/logout.js"></script>
    <script>
        // Load offers for dropdown
        async function loadOffers() {
            const result = await callAPI(API.OFFERS, 'GET');
            
            if (result.success && result.data) {
                const select = document.getElementById('offerId');
                select.innerHTML = '<option value="">No offer</option>' + 
                    result.data.map(offer => `<option value="${offer.id}">${offer.name} - ₹${offer.price} (${offer.validityDays} days)</option>`).join('');
            }
        }
        
        // Handle form submission
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                dob: document.getElementById('dob').value || null,
                simNumber: document.getElementById('simNumber').value || null,
                offerId: document.getElementById('offerId').value ? parseInt(document.getElementById('offerId').value) : null,
                street: document.getElementById('street').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value,
                landmark: document.getElementById('landmark').value,
                idType: document.getElementById('idType').value,
                idNumber: document.getElementById('idNumber').value
            };
            
            const result = await callAPI(API.ADMIN_USERS, 'POST', userData);
            
            if (result.success) {
                alert('User created successfully!');
                window.location.href = '/admin/manage-users.html';
            } else {
                alert('Error creating user: ' + (result.data?.message || 'Please check the details and try again'));
            }
        });
        
        // Load offers on page load
        loadOffers();
    </script>
</body>
</html>
