<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Update - SIM Activation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #c62828;
            --dark-red: #8B0000;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-red) 100%);
            min-height: 100vh;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--white);
            font-weight: 500;
        }

        .progress-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 2rem;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            background: var(--white);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .step.completed {
            border-color: #4caf50;
            background: #4caf50;
            color: var(--white);
        }

        .step.active {
            border-color: var(--primary-red);
            background: var(--primary-red);
            color: var(--white);
        }

        .step-label {
            position: absolute;
            top: 45px;
            font-size: 0.8rem;
            white-space: nowrap;
            color: var(--white);
        }

        .form-container {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid var(--glass-border);
        }

        .form-container h2 {
            color: var(--white);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--white);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            font-size: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-next {
            background: var(--primary-red);
            color: var(--white);
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 1rem; }
            .step-label { display: none; }
            .form-row { grid-template-columns: 1fr; }
            .form-container { margin: 1rem; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📱 Telecom SIM Activation</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/user/status.html">Check Status</a>
            </div>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-steps">
            <div class="step completed">1<span class="step-label">SIM Validation</span></div>
            <div class="step completed">2<span class="step-label">Customer Details</span></div>
            <div class="step active">3<span class="step-label">Address</span></div>
            <div class="step">4<span class="step-label">ID Proof</span></div>
            <div class="step">5<span class="step-label">Offers</span></div>
            <div class="step">6<span class="step-label">Activation</span></div>
        </div>
    </div>

    <div class="form-container">
        <h2>Step 3: Address Details</h2>
        <form id="addressForm">
            <div class="form-group">
                <label>Street Address *</label>
                <input type="text" id="street" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>City *</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label>State *</label>
                    <input type="text" id="state" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Pincode *</label>
                    <input type="text" id="pincode" required pattern="[0-9]{6}" maxlength="6">
                </div>
                <div class="form-group">
                    <label>Landmark</label>
                    <input type="text" id="landmark" placeholder="Optional">
                </div>
            </div>
            <button type="submit" class="btn-next">Continue →</button>
        </form>
    </div>

    <script>
        function getFromSession(key) {
            const value = sessionStorage.getItem(key);
            return value ? JSON.parse(value) : null;
        }
        
        function saveToSession(key, value) {
            sessionStorage.setItem(key, JSON.stringify(value));
        }
        
        // Load previous data
        const savedData = getFromSession('addressData');
        if (savedData) {
            document.getElementById('street').value = savedData.street || '';
            document.getElementById('city').value = savedData.city || '';
            document.getElementById('state').value = savedData.state || '';
            document.getElementById('pincode').value = savedData.pincode || '';
            document.getElementById('landmark').value = savedData.landmark || '';
        }
        
        document.getElementById('addressForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const addressData = {
                street: document.getElementById('street').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value,
                landmark: document.getElementById('landmark').value
            };
            
            saveToSession('addressData', addressData);
            window.location.href = '/user/id-proof.html';
        });
    </script>
</body>
</html>
